<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>开发者脚本助手</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/app.css" rel="stylesheet">
</head>
<body>
  <div class="app-wrapper" id="appWrapper">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="/" class="sidebar-brand" data-route-path="/">
          <i class="bi bi-terminal-fill brand-icon"></i>
          <span class="brand-text">脚本助手</span>
        </a>
        <button type="button" class="btn btn-link sidebar-toggle d-none d-lg-inline-flex" id="btnSidebarCollapse" title="折叠菜单">
          <i class="bi bi-chevron-left"></i>
        </button>
      </div>

      <nav class="sidebar-nav">
        <ul class="nav flex-column" id="sidebarNavList"></ul>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-footer-inner">
          <i class="bi bi-info-circle"></i>
          <span class="nav-text">v1.0.0</span>
        </div>
      </div>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <button type="button" class="btn btn-link topbar-toggle" id="btnSidebarToggle" title="切换菜单">
          <i class="bi bi-list"></i>
        </button>
        <div class="topbar-title">
          <h1 class="page-title mb-0" id="pageTitle"></h1>
          <p class="page-subtitle mb-0" id="pageSubtitle"></p>
        </div>
        <div class="topbar-actions" id="topbarActions"></div>
      </header>

      <main class="content-area" id="pageContent"></main>
    </div>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div id="pageModals"></div>
  <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
